<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CVE MCQ Quiz — Module-wise Practice</title>
<style>
  :root{
    --ink:#1a1c2a;
    --paper:#f5f4f0;
    --paper-dim:#eceae2;
    --rule:#ccc9bc;
    --accent:#34478a;
    --accent-soft:#dde3f5;
    --wrong:#8c2d20;
    --wrong-soft:#f5e0dc;
    --mono:'Courier New',Courier,monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:Georgia,'Times New Roman',serif;
    line-height:1.55;
    padding:24px 16px 80px;
  }
  .wrap{max-width:780px;margin:0 auto;}

  /* HEADER */
  header.top{
    border-top:5px solid var(--accent);
    border-bottom:2px solid var(--ink);
    padding:16px 0 14px;
    margin-bottom:24px;
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    flex-wrap:wrap;
    gap:10px;
  }
  .top-left .eyebrow{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--accent);
  }
  .top-left h1{
    margin:4px 0 0;
    font-size:28px;
    font-weight:700;
    letter-spacing:-0.01em;
  }
  .top-left .subtitle{
    font-size:13px;
    color:#5a5850;
    margin-top:2px;
  }
  .count-badge{
    font-family:var(--mono);
    font-size:12px;
    background:var(--accent);
    color:#fff;
    padding:7px 12px;
    white-space:nowrap;
  }

  /* CONTROLS */
  .control-bar{
    display:flex;
    gap:12px;
    align-items:center;
    flex-wrap:wrap;
    background:var(--paper-dim);
    border:1px solid var(--rule);
    padding:14px 16px;
    margin-bottom:24px;
  }
  .control-bar label{
    font-family:var(--mono);
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.09em;
    color:#5a5648;
    white-space:nowrap;
  }
  select#moduleSelect{
    font-family:var(--mono);
    font-size:14px;
    padding:8px 10px;
    border:1px solid var(--ink);
    background:var(--paper);
    color:var(--ink);
    flex:1;
    min-width:220px;
  }
  .score-display{
    font-family:var(--mono);
    font-size:13px;
    border:1px dashed var(--accent);
    padding:7px 12px;
    color:var(--accent);
    font-weight:bold;
    white-space:nowrap;
  }
  button#resetBtn{
    font-family:var(--mono);
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.07em;
    background:var(--ink);
    color:var(--paper);
    border:none;
    padding:9px 14px;
    cursor:pointer;
    white-space:nowrap;
  }
  button#resetBtn:hover{background:var(--accent);}
  button#resetBtn:active{transform:translateY(1px);}

  /* EMPTY STATE */
  #emptyState{
    text-align:center;
    padding:60px 20px;
    color:#9a9488;
    font-family:var(--mono);
    font-size:13px;
    border:1px dashed var(--rule);
  }

  /* QUESTION CARDS */
  .q-card{
    border:1px solid var(--rule);
    background:#fefefe;
    margin-bottom:18px;
    padding:18px 20px 16px;
  }
  .q-num{
    font-family:var(--mono);
    font-size:10.5px;
    color:var(--accent);
    letter-spacing:0.12em;
    text-transform:uppercase;
  }
  .q-text{
    font-size:16.5px;
    font-weight:700;
    margin:6px 0 14px;
    line-height:1.4;
  }
  .options{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .opt{
    display:flex;
    align-items:flex-start;
    gap:10px;
    text-align:left;
    width:100%;
    border:1px solid var(--rule);
    background:var(--paper);
    color:var(--ink);
    font-family:Georgia,serif;
    font-size:14.5px;
    padding:9px 12px;
    cursor:pointer;
    transition:background 0.12s,border-color 0.12s;
  }
  .opt:hover:not(:disabled){
    border-color:var(--accent);
    background:var(--accent-soft);
  }
  .opt:disabled{cursor:default;}
  .opt .tag{
    font-family:var(--mono);
    font-size:11px;
    color:#8a8470;
    flex-shrink:0;
    width:16px;
    padding-top:2px;
  }
  /* correct answer chosen */
  .opt.selected-correct{background:var(--accent-soft);border-color:var(--accent);}
  .opt.selected-correct .tag{color:var(--accent);font-weight:bold;}
  /* wrong answer chosen */
  .opt.selected-wrong{background:var(--wrong-soft);border-color:var(--wrong);}
  .opt.selected-wrong .tag{color:var(--wrong);font-weight:bold;}
  /* reveal correct when wrong was chosen */
  .opt.reveal-correct{border-color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent);}

  .feedback{
    margin-top:12px;
    font-family:var(--mono);
    font-size:12px;
    padding:9px 12px;
    border-left:3px solid var(--accent);
    background:var(--accent-soft);
    line-height:1.5;
  }
  .feedback.wrong{border-left-color:var(--wrong);background:var(--wrong-soft);}
  .feedback .expl{
    margin-top:5px;
    font-style:italic;
    color:#4a5068;
    font-family:Georgia,serif;
    font-size:13px;
  }

  footer.bottom{
    margin-top:40px;
    text-align:center;
    font-family:var(--mono);
    font-size:11px;
    color:#a09880;
    letter-spacing:0.05em;
  }

  @media(max-width:500px){
    header.top h1{font-size:22px;}
    .score-display,.count-badge{width:100%;text-align:center;}
    .control-bar{flex-direction:column;align-items:stretch;}
    select#moduleSelect{min-width:0;width:100%;}
  }
</style>
</head>
<body>

  <header class="top">

  <footer class="bottom">Each question can only be answered once &middot; correct answer is always revealed after clicking</footer>
</div>

/* ============================================================
   STATE & LOGIC
   ============================================================ */
let currentModule = null;
let answered = {};
let score = 0;

const moduleSelect  = document.getElementById('moduleSelect');
const quizContainer = document.getElementById('quizContainer');
const emptyState    = document.getElementById('emptyState');
const scoreDisplay  = document.getElementById('scoreDisplay');
const resetBtn      = document.getElementById('resetBtn');
const totalBadge    = document.getElementById('totalBadge');

// Populate dropdown
let totalQ = 0;
Object.keys(quizData).forEach(mod => {
  const opt = document.createElement('option');
  opt.value = mod;
  opt.textContent = `${mod} (${quizData[mod].length} Qs)`;
  moduleSelect.appendChild(opt);
  totalQ += quizData[mod].length;
});
totalBadge.textContent = `${totalQ} questions / ${Object.keys(quizData).length} modules`;

function letter(i){ return ['a','b','c','d'][i].toUpperCase(); }

function renderModule(modName){
  currentModule = modName;
  answered = {};
  score = 0;
  updateScore();
  quizContainer.innerHTML = '';

  if(!modName){
    emptyState.style.display = 'block';
    return;
  }
  emptyState.style.display = 'none';

  const questions = quizData[modName];
  questions.forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = 'q-card';

    const numEl = document.createElement('div');
    numEl.className = 'q-num';
    numEl.textContent = `Q ${idx + 1} of ${questions.length}`;
    card.appendChild(numEl);

    const textEl = document.createElement('div');
    textEl.className = 'q-text';
    textEl.textContent = item.q;
    card.appendChild(textEl);

    const optsWrap = document.createElement('div');
    optsWrap.className = 'options';
    item.options.forEach((optText, oi) => {
      const btn = document.createElement('button');
      btn.className = 'opt';
      btn.innerHTML = `<span class="tag">${letter(oi)}</span><span>${optText}</span>`;
      btn.addEventListener('click', () => handleAnswer(idx, oi, card));
      optsWrap.appendChild(btn);
    });
    card.appendChild(optsWrap);

    const fb = document.createElement('div');
    fb.className = 'feedback';
    fb.style.display = 'none';
    fb.dataset.role = 'feedback';
    card.appendChild(fb);

    quizContainer.appendChild(card);
  });
}

function handleAnswer(qIdx, chosenIdx, card){
  if(answered[qIdx]) return;
  answered[qIdx] = true;

  const item = quizData[currentModule][qIdx];
  const correctIdx = item.answer;
  const isCorrect  = chosenIdx === correctIdx;
  if(isCorrect) score++;
  updateScore();

  const optButtons = card.querySelectorAll('.opt');
  optButtons.forEach((btn, oi) => {
    btn.disabled = true;
    if(oi === chosenIdx && isCorrect)  btn.classList.add('selected-correct');
    if(oi === chosenIdx && !isCorrect) btn.classList.add('selected-wrong');
    if(oi === correctIdx)              btn.classList.add('reveal-correct');
  });

  const fb = card.querySelector('[data-role="feedback"]');
  fb.style.display = 'block';
  fb.className = isCorrect ? 'feedback' : 'feedback wrong';
  fb.innerHTML = isCorrect
    ? `<strong>Correct</strong> — (${letter(correctIdx)}) ${item.options[correctIdx]}<div class="expl">${item.explanation}</div>`
    : `<strong>Wrong.</strong> Correct answer: (${letter(correctIdx)}) ${item.options[correctIdx]}<div class="expl">${item.explanation}</div>`;
}

function updateScore(){
  const total = currentModule ? quizData[currentModule].length : 0;
  scoreDisplay.textContent = `Score: ${score} / ${total}`;
}

moduleSelect.addEventListener('change', e => renderModule(e.target.value));
resetBtn.addEventListener('click', () => { if(currentModule) renderModule(currentModule); });
</script>
</body>
</html>
